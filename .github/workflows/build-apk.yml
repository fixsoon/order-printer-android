name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer and dependencies
        run: |
          pip install buildozer cython==0.29.33
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            autoconf \
            automake \
            build-essential \
            ccache \
            cmake \
            gettext \
            autopoint \
            libffi-dev \
            libltdl-dev \
            libssl-dev \
            libtool \
            pkg-config \
            zlib1g-dev

      - name: Cache buildozer files
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-

      - name: Build APK with buildozer
        run: |
          buildozer android debug
        timeout-minutes: 60

      - name: Set version output name
        run: |
          VERSION=$(grep "^version = " buildozer.spec | sed 's/version = //')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: 标签打印Hermes-${{ env.VERSION }}
          path: bin/*.apk
          retention-days: 30
